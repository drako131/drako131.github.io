# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate image manifest
        run: |
          cd images
          # Use python3 for reliable JSON generation with filenames containing spaces/special chars
          python3 -c "
          import os, json, pathlib
          exts = {'.webp','.png','.jpg','.jpeg','.gif','.bmp','.svg','.avif'}
          files = []
          for f in pathlib.Path('.').iterdir():
              if f.is_file() and f.suffix.lower() in exts:
                  files.append((f.stat().st_mtime, f.name))
          # Sort newest first
          files.sort(key=lambda x: x[0], reverse=True)
          names = [name for _, name in files]
          with open('manifest.json', 'w') as out:
              json.dump(names, out, indent=2, ensure_ascii=False)
          print(f'Generated manifest with {len(names)} images')
          "
          cat manifest.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
